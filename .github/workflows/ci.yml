name: ci

on:
  push:
  pull_request:

jobs:
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build v1 + v2 (direct g++, no CMake dependency needed)
        working-directory: cpp
        run: |
          g++ -std=c++20 -O3 -Wall -Wextra -Iinclude src/order_book.cpp tests/test_order_book.cpp -o test_v1
          g++ -std=c++20 -O3 -Wall -Wextra -Iinclude src/order_book_v2.cpp tests/test_order_book_v2.cpp -o test_v2
          g++ -std=c++20 -O3 -Iinclude -Ibench src/order_book.cpp bench/bench_v1.cpp -o bench_v1
          g++ -std=c++20 -O3 -Iinclude -Ibench src/order_book_v2.cpp bench/bench_v2.cpp -o bench_v2
          g++ -std=c++20 -O3 -Iinclude -Ifuzz src/order_book.cpp fuzz/fuzz_v1.cpp -o fuzz_v1
          g++ -std=c++20 -O3 -Iinclude -Ifuzz src/order_book_v2.cpp fuzz/fuzz_v2.cpp -o fuzz_v2

      - name: unit tests (must pass)
        working-directory: cpp
        run: |
          ./test_v1
          ./test_v2

      - name: differential fuzz — v2 must match v1 exactly (correctness gate)
        working-directory: cpp
        run: |
          fail=0
          for seed in 1 2 3 7 42 99 12345 987654321; do
            if ! diff <(./fuzz_v1 "$seed" 50000) <(./fuzz_v2 "$seed" 50000); then
              echo "MISMATCH at seed $seed"
              fail=1
            fi
          done
          exit $fail

      - name: benchmark (informational only — CI runners are noisy, not a perf gate)
        working-directory: cpp
        run: |
          ./bench_v1
          ./bench_v2

      - name: cmake build (sanity check the CMakeLists in parallel with the direct g++ build above)
        working-directory: cpp
        run: |
          sudo apt-get update -y && sudo apt-get install -y cmake
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j
          ctest --output-on-failure
